<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Profile - Hello Pet Shop</title>
    <link rel="stylesheet" href="/css/admin_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; background-color: #f8fafc; }
        
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid #f1f5f9;
        }

        .profile-avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #f1f5f9;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .edit-icon {
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
        }
        .edit-icon:hover { color: #3b82f6; }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 24px;
        }

        .info-field {
            margin-bottom: 20px;
        }

        .info-label {
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
            display: block;
        }

        .info-value {
            width: 100%;
            padding: 12px 16px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #475569;
            box-sizing: border-box;
            min-height: 46px;
        }

        /* Modal Styles */
        .drawer-overlay-profile { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; opacity: 0; transition: opacity 0.3s; align-items: center; justify-content: center; }
        .drawer-overlay-profile.show { display: flex; opacity: 1; }
        .drawer-profile { position: relative; width: 100%; max-width: 600px; max-height: 90vh; background: white; z-index: 1000; transition: transform 0.3s ease, opacity 0.3s ease; overflow-y: auto; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transform: scale(0.95); opacity: 0; }
        .drawer-profile.open { transform: scale(1); opacity: 1; }
        .drawer-header-profile { font-size: 20px; font-weight: bold; margin-bottom: 24px; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; text-align: left; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; color: #334155; box-sizing: border-box; }
        .form-group input:focus { border-color: #3b82f6; outline: none; }
        .drawer-footer-profile { margin-top: 30px; display: flex; justify-content: flex-end; gap: 12px; }
        .btn-cancel { padding: 10px 24px; border-radius: 6px; border: none; background: #f1f5f9; color: #475569; cursor: pointer; font-weight: 600; }
        .btn-save { padding: 10px 24px; border-radius: 6px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: 600; }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-container {
                padding: 24px 16px;
                border-radius: 12px;
            }
        }
    </style>

    <!-- Mobile User-Agent Check -->
    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            document.documentElement.classList.add('mobile-device');
        }
    </script>
</head>
<body>
    <div class="admin-wrapper">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <i class="fas fa-bars hamburger-btn" onclick="toggleSidebar()"></i>
            <h2>Profile</h2>
            <div style="width: 20px;"></div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header" style="background-color: #3b5030;">
                <i class="fas fa-paw"></i>
                <span>Hello Pet Shop</span>
            </div>
            <nav class="sidebar-menu">
                <div style="padding: 10px 24px; font-size: 12px; color: #3b82f6; font-weight: 600;">Staff</div>
                <a href="staff_profile.html" class="menu-item active">
                    <i class="fas fa-home"></i>
                    <span>Profile</span>
                </a>
                <div class="menu-group open">
                    <a href="#" class="menu-item" onclick="toggleSubmenu(this)">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                        <i class="fas fa-chevron-down menu-arrow"></i>
                    </a>
                    <div class="submenu">
                        <a href="staff_stock.html">Stock Management</a>
                        <a href="staff_promotions.html">Promotions</a>
                    </div>
                </div>
                <a href="staff_orders.html" class="menu-item">
                    <i class="fas fa-file-invoice"></i>
                    <span>Orders</span>
                </a>
                <a href="staff_customers.html" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="#" class="menu-item logout-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>
        
        <!-- Sidebar Overlay (Mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div id="loading" style="text-align: center; padding: 50px; color: #64748b;">กำลังโหลดข้อมูลบุคลากร...</div>

            <div id="contentBlock" style="display: none;">
                <div class="profile-container">
                    <div class="profile-avatar-section">
                        <div class="avatar-circle" id="avatarContainer">
                            <i class="far fa-user"></i>
                        </div>
                        <div class="profile-name" id="sName">Loading...</div>
                        <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="handleAvatarChange(event)">
                        <i class="far fa-edit edit-icon" title="Edit Avatar" onclick="document.getElementById('avatarUpload').click();"></i>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <div class="section-title" style="margin-bottom: 0;">Personal Information</div>
                        <button onclick="openProfileDrawer()" style="padding: 8px 16px; background: #f8fafc; color: #3b82f6; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='#f8fafc'"><i class="fas fa-edit"></i> Edit Profile</button>
                    </div>

                    <div class="info-field">
                        <label class="info-label">Name</label>
                        <div class="info-value" id="sFullName"></div>
                    </div>

                    <div class="info-field">
                        <label class="info-label">Address</label>
                        <div class="info-value" id="sAddress" style="white-space: pre-wrap; height: auto;"></div>
                    </div>

                    <div class="info-field">
                        <label class="info-label">Phone Number</label>
                        <div class="info-value" id="sPhone"></div>
                    </div>

                    <div class="info-field">
                        <label class="info-label">Email</label>
                        <div class="info-value" id="sEmail"></div>
                    </div>

                    <div class="info-field">
                        <label class="info-label">Job Position</label>
                        <div class="info-value" id="sPosition"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Profile Drawer -->
    <div class="drawer-overlay-profile" id="drawerOverlayProfile">
        <div class="drawer-profile" id="staffDrawerProfile">
            <div class="drawer-header-profile">Edit Profile Information</div>
            <form id="staffProfileForm">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="edit_first_name" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="edit_last_name" name="last_name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="edit_email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="edit_phone" name="phone">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="edit_address" name="address">
                </div>
                <div class="drawer-footer-profile">
                    <button type="button" class="btn-cancel" onclick="closeProfileDrawer()">Cancel</button>
                    <button type="button" class="btn-save" id="saveProfileBtn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function toggleSubmenu(el) {
            const group = el.closest('.menu-group');
            group.classList.toggle('open');
            localStorage.setItem('staffProductsMenuOpen', group.classList.contains('open'));
        }

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            const role = user ? (user.role_name || '').toLowerCase() : '';
            if (!user || role === 'customer') {
                window.location.href = '/login.html';
                return null;
            }
            return user;
        }

        let currentStaffData = null;

        async function loadProfile(user) {
            try {
                // Fetch using logged-in user profile
                const res = await fetch(`/api/staff/me?user_id=${user.user_id}`);
                const json = await res.json();

                if (res.ok) {
                    currentStaffData = json.data;
                    renderProfile(json.data);
                } else {
                    document.getElementById('loading').innerHTML = `<span style="color: red;">Error: ${json.message}</span>`;
                }
            } catch (err) {
                document.getElementById('loading').innerHTML = '<span style="color: red;">Connection error.</span>';
            }
        }

        function formatPhone(phone) {
            if (!phone) return '-';
            if (phone.length === 10) {
                return phone.substring(0, 3) + '*******';
            }
            return phone;
        }

        function renderProfile(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('contentBlock').style.display = 'block';

            const fullName = `${data.first_name} ${data.last_name || ''}`.trim();
            document.getElementById('sName').textContent = fullName || 'Unknown Staff';
            document.getElementById('sFullName').textContent = fullName || '-';
            
            // Reformat address
            const addr = data.address || '-';
            document.getElementById('sAddress').textContent = addr;

            document.getElementById('sPhone').textContent = formatPhone(data.phone);
            document.getElementById('sEmail').textContent = data.email || '-';
            document.getElementById('sPosition').textContent = data.position || 'Staff';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const menuGroup = document.querySelector('.menu-group');
            if (menuGroup) {
                const isOpen = localStorage.getItem('staffProductsMenuOpen');
                if (isOpen === 'true') menuGroup.classList.add('open');
                else if (isOpen === 'false') menuGroup.classList.remove('open');
            }

            const user = checkAuth();
            if (user) {
                loadProfile(user);
            }

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('user');
                    window.location.href = '/login.html';
                });
            }
        });

        function handleAvatarChange(event) {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const avatarContainer = document.getElementById('avatarContainer');
                avatarContainer.innerHTML = `<img src="${url}" alt="Avatar">`;
                
                // Show a quick visual indication (optional)
                setTimeout(() => {
                    Swal.fire({
                        title: 'สำเร็จ!',
                        text: 'อัปเดตรูปโปรไฟล์สำเร็จ (แสดงผลชั่วคราว)',
                        icon: 'success',
                        confirmButtonText: 'ตกลง',
                        confirmButtonColor: '#3b82f6'
                    });
                }, 100);
            }
        }

        // Profile Drawer Logic
        function openProfileDrawer() {
            if (!currentStaffData) return;
            document.getElementById('edit_first_name').value = currentStaffData.first_name || '';
            document.getElementById('edit_last_name').value = currentStaffData.last_name || '';
            document.getElementById('edit_email').value = currentStaffData.email || '';
            document.getElementById('edit_phone').value = currentStaffData.phone || '';
            document.getElementById('edit_address').value = currentStaffData.address || '';
            
            const overlay = document.getElementById('drawerOverlayProfile');
            const drawer = document.getElementById('staffDrawerProfile');
            overlay.classList.add('show');
            setTimeout(() => {
                drawer.classList.add('open');
            }, 10);
        }

        function closeProfileDrawer() {
            document.getElementById('staffDrawerProfile').classList.remove('open');
            setTimeout(() => {
                document.getElementById('drawerOverlayProfile').classList.remove('show');
            }, 300);
        }

        document.getElementById('drawerOverlayProfile')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('drawerOverlayProfile')) {
                closeProfileDrawer();
            }
        });

        document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
            const form = document.getElementById('staffProfileForm');
            if(!form.checkValidity()) { form.reportValidity(); return; }

            const payload = Object.assign({}, currentStaffData);
            payload.first_name = document.getElementById('edit_first_name').value;
            payload.last_name = document.getElementById('edit_last_name').value;
            payload.email = document.getElementById('edit_email').value;
            payload.phone = document.getElementById('edit_phone').value;
            payload.address = document.getElementById('edit_address').value;
            
            payload.id = currentStaffData.employee_id || currentStaffData.id;

            try {
                const btn = document.getElementById('saveProfileBtn');
                btn.textContent = 'Saving...';
                btn.disabled = true;

                const res = await fetch(`/api/staff/update?id=${payload.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                btn.textContent = 'Save Changes';
                btn.disabled = false;

                if (res.ok) {
                    Swal.fire({
                        title: 'สำเร็จ!',
                        text: 'อัปเดตข้อมูลส่วนตัวสำเร็จ',
                        icon: 'success',
                        confirmButtonText: 'ตกลง',
                        confirmButtonColor: '#3b82f6'
                    }).then(() => {
                        const user = checkAuth();
                        if(user) loadProfile(user);
                    });
                    closeProfileDrawer();
                } else {
                    const errorJson = await res.json();
                    Swal.fire({
                        title: 'เกิดข้อผิดพลาด',
                        text: errorJson.message || 'มีบางอย่างผิดพลาด',
                        icon: 'error',
                        confirmButtonText: 'ตกลง',
                        confirmButtonColor: '#fb7185'
                    });
                }
            } catch (err) {
                Swal.fire({
                    title: 'ข้อผิดพลาด',
                    text: 'เกิดข้อผิดพลาดในการเชื่อมต่อ',
                    icon: 'error',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#fb7185'
                });
                const btn = document.getElementById('saveProfileBtn');
                btn.textContent = 'Save Changes';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
