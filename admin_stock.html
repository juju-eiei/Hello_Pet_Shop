<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management - Hello Pet Shop</title>
    <link rel="stylesheet" href="/css/admin_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Mobile User-Agent Check -->
    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            document.documentElement.classList.add('mobile-device');
        }
    </script>
    
    <style>
        /* Modern UI Redesign */
        body { background-color: #f8fafc; font-family: 'Inter', 'Noto Sans Thai', sans-serif; }
        
        /* Product Card Layout */
        .stock-card {
            pointer-events: auto !important;
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            padding: 16px !important;
            background: #ffffff !important;
            border-radius: 16px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03) !important;
            margin-bottom: 16px !important;
            border: 1px solid #f1f5f9 !important;
            width: 100% !important;
            box-sizing: border-box !important;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stock-card:active { transform: scale(0.98); }
        .stock-card-left {
            flex: 0 0 60px;
            margin-right: 16px;
        }
        .stock-card-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            background: #f1f5f9;
        }
        .stock-card-middle {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }
        .stock-card-name {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .stock-status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .pill-in-stock { background: #dcfce7; color: #15803d; }
        .pill-low-stock { background: #fef9c3; color: #b45309; }
        .pill-out-of-stock { background: #fee2e2; color: #b91c1c; }

        .stock-card-right {
            flex: 0 0 auto;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            padding-left: 12px;
        }
        .stock-qty-text {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 2px;
            font-weight: 500;
        }
        .stock-qty-number {
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
        }

        /* Search Bar */
        .search-container {
            background: #f1f5f9 !important;
            border-radius: 50px !important;
            padding: 4px 20px !important;
            box-shadow: none !important;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px !important;
            display: flex;
            align-items: center;
        }
        .search-container input {
            background: transparent !important;
            font-size: 15px !important;
        }
        .search-container i { color: #64748b !important; font-size: 16px; margin-right: 12px; }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
            margin-bottom: 24px;
            border: none !important;
        }
        .filter-btn {
            flex: 1;
            padding: 8px 12px !important;
            border-radius: 10px !important;
            background: transparent !important;
            border: none !important;
            color: #64748b !important;
            font-weight: 600 !important;
            font-size: 13px !important;
            transition: all 0.2s;
            box-shadow: none !important;
        }
        .filter-btn.active {
            background: #2f5d3a !important;
            color: #ffffff !important;
            box-shadow: 0 2px 8px rgba(47, 93, 58, 0.3) !important;
        }

        /* Hide desktop table header on mobile */
        @media (max-width: 768px) {
            .table-header { display: none !important; }
            .stock-table { background: transparent !important; box-shadow: none !important; padding: 0 !important; }
        }

    </style>


</head>
<body>
    <div class="admin-wrapper">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <i class="fas fa-bars" id="hamburgerBtn"></i>
            <h2>Stock Management</h2>
            <i class="fas fa-bell"></i>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-paw"></i>
                <span>Hello Pet Shop</span>
            </div>
            <nav class="sidebar-menu">
                <div style="padding: 10px 24px; font-size: 12px; color: #3b82f6; font-weight: 600;">Admin</div>
                <a href="admin_dashboard.html" class="desktop-only-menu menu-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <div class="menu-group open">
                    <a class="menu-item active" onclick="toggleSubmenu(this)">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                        <i class="fas fa-chevron-down menu-arrow"></i>
                    </a>
                    <div class="submenu">
                        <a href="admin_stock.html" class="active">Stock Management</a>
                        <a href="admin_product_management.html">Product Management</a>
                        <a href="admin_promotions.html">Promotions</a>
                    </div>
                </div>
                <a href="admin_staff.html" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>Staff Management</span>
                </a>
                <a href="admin_orders.html" class="menu-item">
                    <i class="fas fa-file-invoice"></i>
                    <span>Orders</span>
                </a>
                <a href="admin_customers.html" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="#" class="menu-item logout-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Stock Management</h1>
            </div>

            <!-- Search -->
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search products...">
            </div>

            <!-- Filters -->
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="low_stock">Low Stock</button>
                <button class="filter-btn" data-filter="out_of_stock">Out of Stock</button>
            </div>

            <!-- Table -->
            <div class="stock-table">
                <div class="table-header">
                    <span style="flex: 2;">Product</span>
                    <span style="flex: 1; text-align: center;">Status</span>
                    <span style="flex: 1; text-align: right;">Stock Quantity</span>
                </div>
                <div id="productContainer">
                    <div style="padding: 50px; text-align: center; color: #718096;">กำลังโหลดข้อมูล...</div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="admin_dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="admin_orders.html" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>Orders</span>
            </a>
            <a href="admin_stock.html" class="nav-item active">
                <i class="fas fa-box"></i>
                <span>Stock</span>
            </a>
            <a href="admin_customers.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="admin_promotions.html" class="nav-item">
                <i class="fas fa-bullhorn"></i>
                <span>Promotions</span>
            </a>
        </nav>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let currentFilter = new URLSearchParams(window.location.search).get('filter') || 'all';
        if (!['all', 'low_stock', 'out_of_stock'].includes(currentFilter)) currentFilter = 'all';
        let currentKeyword = '';

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role_name.toLowerCase() !== 'admin') {
                window.location.href = 'login.html';
            }
        }

        async function fetchProducts() {
            try {
                const url = `api/products?keyword=${encodeURIComponent(currentKeyword)}&filter=${currentFilter}`;
                const response = await fetch(url);
                const result = await response.json();
                if (response.ok) renderProducts(result.data);
            } catch (error) {
                showToast("เกิดข้อผิดพลาดในการดึงข้อมูล", "error");
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productContainer');
            if (products.length === 0) {
                container.innerHTML = '<div style="padding: 50px; text-align: center; color: #718096;">ไม่พบสินค้า</div>';
                return;
            }

            container.innerHTML = products.map(p => {
                let statusClass = 'status-in-stock';
                let statusText = 'In Stock';
                const qty = parseInt(p.stock_qty) || 0;

                if (qty === 0) {
                    statusClass = 'status-out-of-stock';
                    statusText = 'Out of Stock';
                } else if (qty < 5) {
                    statusClass = 'status-low-stock';
                    statusText = 'Low Stock';
                }

                return `
                    <div class="product-row stock-card" onclick="window.location.href='admin_product_edit.html?id=${p.product_id}'; return false;" style="cursor: pointer;">
                        <div class="stock-card-left">
                            <img src="${p.image_url || 'assets/img/pet_product_placeholder.png'}" 
                                 onerror="this.src='https://placehold.co/100x100/f1f5f9/94a3b8?text=Image'" 
                                 class="stock-card-img">
                        </div>
                        <div class="stock-card-middle">
                            <div class="stock-card-name">${p.product_name}</div>
                            <div class="stock-status-pill ${statusClass}">${statusText}</div>
                        </div>
                        <div class="stock-card-right">
                            <div class="stock-qty-text">Qty</div>
                            <div class="stock-qty-number">${qty}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function updateQty(id, newQty) {
            if (isNaN(newQty) || newQty < 0) {
                showToast("กรุณากรอกตัวเลขที่ถูกต้อง", "error");
                fetchProducts();
                return;
            }

            try {
                const response = await fetch('api/products/update-stock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_id: id, new_quantity: newQty })
                });

                if (response.ok) {
                    showToast("อัปเดตสต็อกเรียบร้อย", "success");
                    fetchProducts();
                } else {
                    const result = await response.json();
                    showToast(result.message, "error");
                }
            } catch (error) {
                showToast("เกิดข้อผิดพลาดในการอัปเดต", "error");
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentKeyword = e.target.value;
            fetchProducts();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                fetchProducts();
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);

                function toggleSubmenu(el) {
            const group = el.closest('.menu-group');
            group.classList.toggle('open');
            localStorage.setItem('productsMenuOpen', group.classList.contains('open'));
        }

        // Restore submenu state
        document.addEventListener('DOMContentLoaded', () => {
            const menuGroup = document.querySelector('.menu-group');
            if (menuGroup) {
                const isOpen = localStorage.getItem('productsMenuOpen');
                if (isOpen === 'true') menuGroup.classList.add('open');
                else if (isOpen === 'false') menuGroup.classList.remove('open');
            }
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.filter === currentFilter) {
                btn.classList.add('active');
            }
        });
        checkAuth();
        fetchProducts();
    </script>
</body>
</html>
