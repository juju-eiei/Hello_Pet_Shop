<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management - Hello Pet Shop</title>
    <link rel="stylesheet" href="/css/admin_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Mobile User-Agent Check -->
    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            document.documentElement.classList.add('mobile-device');
        }
    </script>
    
    <style>
        /* Premium UI Redesign */
        body { background-color: #f4f7fb; font-family: 'Outfit', 'Kanit', sans-serif; color: #334155; }
        
        .page-header h1 { font-size: 28px; font-weight: 800; color: #1e293b; letter-spacing: -0.5px; background: linear-gradient(90deg, #1e293b, #334155); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        /* Search Bar Setup */
        .search-container {
            background: #ffffff !important;
            border-radius: 100px !important;
            padding: 12px 24px !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03) !important;
            border: 1px solid #e2e8f0;
            margin-bottom: 24px !important;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .search-container:focus-within { box-shadow: 0 8px 30px rgba(47, 93, 58, 0.1) !important; border-color: #94ad5e; }
        .search-container input { background: transparent !important; font-size: 15px !important; font-weight: 500; border: none; outline: none; width: 100%; color: #1e293b; }
        .search-container i { color: #94a3b8 !important; font-size: 18px; margin-right: 14px; }

        /* Filter Tabs Premium */
        .filter-tabs {
            display: inline-flex;
            background: white;
            padding: 6px;
            border-radius: 16px;
            gap: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0 !important;
        }
        .filter-btn {
            padding: 10px 20px !important;
            border-radius: 12px !important;
            background: transparent !important;
            border: none !important;
            color: #64748b !important;
            font-weight: 600 !important;
            font-size: 14px !important;
            transition: all 0.3s ease;
            box-shadow: none !important;
            cursor: pointer;
        }
        .filter-btn:hover { color: #1e293b !important; background: #f8fafc !important; }
        .filter-btn.active {
            background: linear-gradient(135deg, #314d2a, #3e6135) !important;
            color: #ffffff !important;
            box-shadow: 0 4px 12px rgba(49, 77, 42, 0.25) !important;
            transform: translateY(-1px);
        }

        /* Mobile Filter Adjustment */
        @media (max-width: 768px) {
            .filter-tabs { width: 100%; display: flex; box-sizing: border-box; }
            .filter-btn { flex: 1; text-align: center; }
        }
    </style>


</head>
<body>
    <div class="admin-wrapper">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <i class="fas fa-bars" id="hamburgerBtn"></i>
            <h2>Stock Management</h2>
            <i class="fas fa-bell"></i>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-paw"></i>
                <span>Hello Pet Shop</span>
            </div>
            <nav class="sidebar-menu">
                <div style="padding: 10px 24px; font-size: 12px; color: #3b82f6; font-weight: 600;">Admin</div>
                <a href="admin_dashboard.html" class="desktop-only-menu menu-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <div class="menu-group open">
                    <a class="menu-item active" onclick="toggleSubmenu(this)">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                        <i class="fas fa-chevron-down menu-arrow"></i>
                    </a>
                    <div class="submenu">
                        <a href="admin_stock.html" class="active">Stock Management</a>
                        <a href="admin_product_management.html" class="desktop-only-menu">Product Management</a>
                        <a href="admin_promotions.html">Promotions</a>
                    </div>
                </div>
                <a href="admin_staff.html" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>Staff Management</span>
                </a>
                <a href="admin_orders.html" class="menu-item">
                    <i class="fas fa-file-invoice"></i>
                    <span>Orders</span>
                </a>
                <a href="admin_customers.html" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="#" class="menu-item logout-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Stock Management</h1>
            </div>

            <!-- Search -->
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search products...">
            </div>

            <!-- Filters -->
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="low_stock">Low Stock</button>
                <button class="filter-btn" data-filter="out_of_stock">Out of Stock</button>
            </div>

            <!-- Table -->
            <div class="stock-table">
                <div class="table-header">
                    <span style="flex: 2;">Product Name</span>
                    <span style="flex: 1; text-align: center;">Image</span>
                    <span style="flex: 1; text-align: center;">Status</span>
                    <span style="flex: 1; text-align: center;">Stock Quantity</span>
                    <span style="flex: 1; text-align: right;">Actions</span>
                </div>
                <div id="productContainer">
                    <div style="padding: 50px; text-align: center; color: #718096;">กำลังโหลดข้อมูล...</div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="admin_dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="admin_orders.html" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>Orders</span>
            </a>
            <a href="admin_stock.html" class="nav-item active">
                <i class="fas fa-box"></i>
                <span>Stock</span>
            </a>
            <a href="admin_customers.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="admin_promotions.html" class="nav-item">
                <i class="fas fa-bullhorn"></i>
                <span>Promotions</span>
            </a>
        </nav>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let currentFilter = new URLSearchParams(window.location.search).get('filter') || 'all';
        if (!['all', 'low_stock', 'out_of_stock'].includes(currentFilter)) currentFilter = 'all';
        let currentKeyword = '';

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role_name.toLowerCase() !== 'admin') {
                window.location.href = 'login.html';
            }
        }

        async function fetchProducts() {
            try {
                const url = `api/products?keyword=${encodeURIComponent(currentKeyword)}&filter=${currentFilter}`;
                const response = await fetch(url);
                const result = await response.json();
                if (response.ok) renderProducts(result.data);
            } catch (error) {
                showToast("เกิดข้อผิดพลาดในการดึงข้อมูล", "error");
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productContainer');
            if (products.length === 0) {
                container.innerHTML = '<div style="padding: 50px; text-align: center; color: #718096;">ไม่พบสินค้า</div>';
                return;
            }

            container.innerHTML = products.map(p => {
                let statusClass = 'status-in-stock';
                let statusText = 'In Stock';
                const qty = parseInt(p.stock_qty) || 0;

                if (qty === 0) {
                    statusClass = 'status-out-of-stock';
                    statusText = 'Out of Stock';
                } else if (qty < 5) {
                    statusClass = 'status-low-stock';
                    statusText = 'Low Stock';
                }

                return `
                <div class="product-row" style="display: flex; align-items: center; width: 100%;">
                    <div class="product-details" style="flex: 2; margin-right: 20px;">
                        <div class="product-name">${p.product_name}</div>
                    </div>
                    <div style="flex: 1; display: flex; justify-content: center;">
                        <img src="${p.image_url || 'https://via.placeholder.com/60/cbd5e0/4a5568?text=PET'}" 
                             class="product-img" style="margin-right: 0;"
                             onerror="this.src='https://via.placeholder.com/60/cbd5e0/4a5568?text=PET'">
                    </div>
                    <div class="stock-status" style="flex: 1; text-align: center; font-weight: 500;">
                        <span class="${statusClass}">${statusText}</span>
                    </div>
                    <div class="stock-status" style="flex: 1; text-align: center; color: #475569; font-weight: 500;">
                        ${qty}
                    </div>
                    <div class="stock-actions" style="flex: 1; text-align: right; justify-content: flex-end; display: flex; align-items: center; gap: 4px;">
                        <button onclick="updateQty(${p.product_id}, ${qty > 0 ? qty - 1 : 0})" class="qty-btn" title="Decrease">
                            <i class="fas fa-minus"></i>
                        </button>
                        <input type="number" id="qty-${p.product_id}" class="qty-input" value="${qty}" min="0" onchange="updateQty(${p.product_id}, this.value)">
                        <button onclick="updateQty(${p.product_id}, ${qty + 1})" class="qty-btn" title="Increase">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function updateQty(id, newQty) {
            if (isNaN(newQty) || newQty < 0) {
                showToast("กรุณากรอกตัวเลขที่ถูกต้อง", "error");
                fetchProducts();
                return;
            }

            try {
                const response = await fetch('api/products/update-stock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_id: id, new_quantity: newQty })
                });

                if (response.ok) {
                    showToast("อัปเดตสต็อกเรียบร้อย", "success");
                    fetchProducts();
                } else {
                    if (response.status === 401 || response.status === 403) {
                        localStorage.removeItem('user');
                        window.location.href = 'login.html';
                        return;
                    }
                    const result = await response.json();
                    showToast(result.message || "เกิดข้อผิดพลาด", "error");
                }
            } catch (error) {
                showToast("เกิดข้อผิดพลาดในการอัปเดต", "error");
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentKeyword = e.target.value;
            fetchProducts();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                fetchProducts();
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar && overlay) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            }
        }

        document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);

        function toggleSubmenu(el) {
            const group = el.closest('.menu-group');
            if (group) {
                group.classList.toggle('open');
                localStorage.setItem('productsMenuOpen', group.classList.contains('open'));
            }
        }

        // Restore submenu state
        document.addEventListener('DOMContentLoaded', () => {
            const menuGroup = document.querySelector('.menu-group');
            if (menuGroup) {
                const isOpen = localStorage.getItem('productsMenuOpen');
                if (isOpen === 'true') menuGroup.classList.add('open');
                else if (isOpen === 'false') menuGroup.classList.remove('open');
            }
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.filter === currentFilter) {
                btn.classList.add('active');
            }
        });
        checkAuth();
        fetchProducts();
    </script>
</body>
</html>
