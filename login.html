<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hello Pet Shop</title>
    <link rel="stylesheet" href="assets/css/auth_styles.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Top Navbar -->
    <nav>
        <div class="nav-brand">
            <i class="fas fa-paw"></i>
            <span>Hello Pet Shop</span>
        </div>
        <div class="nav-links">
            <a href="#">Product</a>
            <a href="register.html" class="nav-btn">Sign Up</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="auth-card">
            <h2>Log In</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="auth-btn">Log In</button>
                <div class="auth-links">
                    <a href="register.html">Don't have an account? <span>Sign Up</span></a>
                    <br><br>
                    <a href="#" style="color: #a0aec0; font-size: 13px;">Forgot Password?</a>
                </div>
            </form>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    showToast("ยินดีต้อนรับกลับมา! กำลังพาไปหน้าหลัก...", "success");
                    localStorage.setItem('user', JSON.stringify(result.data));
                    
                    // Redirect based on role
                    const userRole = result.data.role_name.toLowerCase();
                    setTimeout(() => {
                        if (userRole === 'admin') {
                            window.location.href = 'admin_stock.html';
                        } else {
                            window.location.href = 'index.php';
                        }
                    }, 1500);
                } else {
                    showToast(result.message || "Login ไม่สำเร็จ", "error");
                }
            } catch (error) {
                showToast("เกิดข้อผิดพลาดในการเชื่อมต่อ", "error");
            }
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }
    </script>
</body>
</html>
