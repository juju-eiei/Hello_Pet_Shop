<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hello Pet Shop</title>
    <!-- Use Vite to load styles -->
    <script type="module" src="/src/js/main.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-gradient-to-br from-primary-50 to-primary-100 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="flex items-center justify-between px-4 sm:px-8 py-4 sm:py-6">
        <div class="flex items-center space-x-2 text-primary-600 flex-shrink-0">
            <div class="w-8 h-8 sm:w-10 sm:h-10 bg-primary-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-paw text-lg sm:text-xl"></i>
            </div>
            <span class="text-lg sm:text-2xl font-bold tracking-tight text-gray-800 whitespace-nowrap hidden sm:inline-block">Hello Pet Shop</span>
            <span class="text-xl font-bold tracking-tight text-gray-800 whitespace-nowrap sm:hidden">Pet Shop</span>
        </div>
        <div class="flex items-center space-x-3 sm:space-x-6">
            <a href="/" class="text-sm sm:text-base text-gray-600 hover:text-primary-600 font-medium transition-colors whitespace-nowrap">Products</a>
            <a href="/register.html" class="whitespace-nowrap text-sm sm:text-base px-4 py-2 sm:px-5 sm:py-2.5 bg-primary-600 text-white rounded-lg font-semibold shadow-md hover:shadow-lg hover:bg-primary-700 transition-all">Sign Up</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl space-y-8">
            <div class="text-center space-y-2">
                <h2 class="text-3xl font-bold text-gray-900">Welcome Back</h2>
                <p class="text-gray-500">Log in to manage your pet shop</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 ml-1">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" name="username" placeholder="Enter your username" required
                            class="w-full pl-11 pr-4 py-3.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all shadow-sm">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 ml-1">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" name="password" placeholder="Enter your password" required
                            class="w-full pl-11 pr-4 py-3.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all shadow-sm">
                    </div>
                </div>

                <button type="submit" class="w-full py-4 bg-primary-600 text-white rounded-xl font-bold shadow-lg hover:shadow-primary-200 hover:bg-primary-700 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                    <span>Log In</span>
                    <i class="fas fa-arrow-right text-sm"></i>
                </button>

                <div class="text-center pt-2">
                    <a href="/register" class="text-gray-500 hover:text-primary-600 transition-colors text-sm">
                        Don't have an account? <span class="text-primary-600 font-semibold underline underline-offset-4">Sign Up</span>
                    </a>
                </div>
            </form>
        </div>
    </main>

    <!-- Toast Component (Simplified for now) -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl shadow-xl transition-all duration-500 opacity-0 translate-y-4 pointer-events-none z-50"></div>

    <script type="module">
        import { showToast } from '/src/js/utils.js';

        // Check if already logged in
        const existingUser = JSON.parse(localStorage.getItem('user'));
        if (existingUser) {
            const role = existingUser.role_name ? existingUser.role_name.toLowerCase() : 'customer';
            if (role === 'admin') {
                window.location.href = 'admin_stock.html';
            } else if (role === 'customer') {
                window.location.href = 'products.html';
            } else {
                window.location.href = 'staff_profile.html';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('Login form submitted!');
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            console.log('Login Request Data:', data);

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    showToast("Login Successful! Redirecting...", "success");
                    localStorage.setItem('user', JSON.stringify(result.data));
                    
                    setTimeout(() => {
                        const role = result.data.role_name ? result.data.role_name.toLowerCase() : 'customer';
                        if (role === 'admin') {
                            window.location.href = 'admin_stock.html';
                        } else if (role === 'customer') {
                            window.location.href = 'products.html';
                        } else {
                            window.location.href = 'staff_profile.html';
                        }
                    }, 1000);
                } else {
                    showToast(result.message || "Invalid credentials", "error");
                }
            } catch (error) {
                showToast("Connection failed", "error");
            }
        });
    </script>
</body>
</html>
