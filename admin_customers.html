<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Hello Pet Shop</title>
    <link rel="stylesheet" href="/css/admin_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .table-cell-text {
            color: #64748b;
            font-size: 14px;
        }
        .table-header span {
            color: #1e293b;
            font-weight: 600;
        }
        .search-container {
            background-color: #cce4f7;
            border-radius: 8px;
            border: none;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            padding: 12px 16px;
        }
        .search-container input {
            background-color: transparent;
            color: #475569;
            border: none;
            outline: none;
            width: 100%;
            margin-left: 10px;
        }
        .pet-badge {
            background-color: #f1f5f9;
            color: #475569;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Premium Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            outline: none;
            font-family: inherit;
        }
        .btn-secondary {
            background-color: white;
            color: #475569;
            border: 1px solid #cbd5e1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-secondary:hover {
            background-color: #f8fafc;
            color: #1e293b;
            border-color: #94a3b8;
        }
        .btn-primary {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }
        .btn-primary:hover {
            background-color: #2563eb;
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <i class="fas fa-bars" id="hamburgerBtn"></i>
            <h2>Customers</h2>
            <i class="fas fa-bell"></i>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-paw"></i>
                <span>Hello Pet Shop</span>
            </div>
            <nav class="sidebar-menu">
                <div style="padding: 10px 24px; font-size: 12px; color: #3b82f6; font-weight: 600;">Admin</div>
                <a href="#" class="menu-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <div class="menu-group">
                    <a class="menu-item" onclick="toggleSubmenu(this)">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                        <i class="fas fa-chevron-down menu-arrow"></i>
                    </a>
                    <div class="submenu">
                        <a href="admin_stock.html">Stock Management</a>
                        <a href="admin_product_management.html">Product Management</a>
                        <a href="admin_promotions.html">Promotions</a>
                    </div>
                </div>
                <a href="admin_staff.html" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>Staff Management</span>
                </a>
                <a href="admin_orders.html" class="menu-item">
                    <i class="fas fa-file-invoice"></i>
                    <span>Orders</span>
                </a>
                <a href="admin_customers.html" class="menu-item active">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="#" class="menu-item logout-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Customer Management</h1>
            </div>

            <!-- Search -->
            <div class="search-container">
                <i class="fas fa-search" style="color: #64748b;"></i>
                <input type="text" id="searchInput" placeholder="Search customers by name, phone, or email...">
            </div>

            <!-- Table -->
            <div class="stock-table">
                <div class="table-header" style="display: flex; padding: 16px 24px; border-bottom: 1px solid #e2e8f0; background-color: #f8fafc; border-top-left-radius: 12px; border-top-right-radius: 12px;">
                    <span style="flex: 2;">Customer Name</span>
                    <span style="flex: 2;">Contact Info</span>
                    <span style="flex: 1;">Reward Points</span>
                    <span style="flex: 2;">Pets</span>
                    <span style="flex: 1; text-align: right;">Action</span>
                </div>
                <div id="customersContainer">
                    <div style="padding: 50px; text-align: center; color: #718096;">Loading customers...</div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation for Mobile -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="admin_orders.html" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>Orders</span>
            </a>
            <a href="admin_stock.html" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Stock</span>
            </a>
            <a href="admin_customers.html" class="nav-item active">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="admin_promotions.html" class="nav-item">
                <i class="fas fa-bullhorn"></i>
                <span>Promotions</span>
            </a>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="/js/utils.js"></script>
    <script>
        // Sidebar logic
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const hamburgerBtn = document.getElementById('hamburgerBtn');

        hamburgerBtn.addEventListener('click', () => {
            sidebar.classList.add('active');
            overlay.classList.add('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });

        function toggleSubmenu(element) {
            element.classList.toggle('active');
            const submenu = element.nextElementSibling;
            if (submenu.style.display === 'block') {
                submenu.style.display = 'none';
            } else {
                submenu.style.display = 'block';
            }
        }

        // Fetch Customers
        let allCustomers = [];

        async function loadCustomers() {
            try {
                const res = await fetch('/api/customers');
                const json = await res.json();
                if (res.ok) {
                    allCustomers = json.data;
                    renderCustomers(allCustomers);
                } else {
                    document.getElementById('customersContainer').innerHTML = `<div style="padding: 50px; text-align: center; color: #ef4444;">Error: ${json.message}</div>`;
                }
            } catch (error) {
                document.getElementById('customersContainer').innerHTML = `<div style="padding: 50px; text-align: center; color: #ef4444;">Connection failed</div>`;
            }
        }

        function renderCustomers(data) {
            const container = document.getElementById('customersContainer');
            if (data.length === 0) {
                container.innerHTML = `<div style="padding: 50px; text-align: center; color: #718096;">No customers found.</div>`;
                return;
            }

            container.innerHTML = data.map(c => `
                <div class="table-row" style="display: flex; padding: 16px 24px; border-bottom: 1px solid #f1f5f9; align-items: center; transition: background-color 0.2s;">
                    <div style="flex: 2; display: flex; flex-direction: column;">
                        <span style="font-weight: 600; color: #1e293b;">${c.name}</span>
                        <span class="table-cell-text" style="font-size: 12px;">ID: CUS-${String(c.customer_id).padStart(4, '0')}</span>
                    </div>
                    <div style="flex: 2; display: flex; flex-direction: column;">
                        <span class="table-cell-text"><i class="fas fa-phone-alt" style="margin-right: 6px; color: #94a3b8;"></i>${c.phone || '-'}</span>
                        <span class="table-cell-text" style="font-size: 12px; margin-top: 4px;"><i class="far fa-envelope" style="margin-right: 6px; color: #94a3b8;"></i>${c.email || '-'}</span>
                    </div>
                    <div style="flex: 1;">
                        <span style="color: #f59e0b; font-weight: 600;">${c.points} <i class="fas fa-star" style="font-size: 12px;"></i></span>
                    </div>
                    <div style="flex: 2;">
                        <div class="pet-badge">
                            <i class="fas fa-paw" style="color: #8b5cf6;"></i> 
                            ${c.pet_count} Pets
                            ${c.pet_count > 0 ? `(${c.pet_types})` : ''}
                        </div>
                    </div>
                    <div style="flex: 1; text-align: right;">
                        <button class="btn btn-primary" style="padding: 6px 12px; font-size: 13px; border-radius: 6px;" onclick="viewCustomer(${c.customer_id})">
                            <i class="far fa-eye"></i> View Profile
                        </button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allCustomers.filter(c => 
                c.name.toLowerCase().includes(val) || 
                (c.phone && c.phone.includes(val)) ||
                (c.email && c.email.toLowerCase().includes(val))
            );
            renderCustomers(filtered);
        });

        function viewCustomer(id) {
            window.location.href = `admin_customer_details.html?id=${id}`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCustomers();
        });
    </script>
</body>
</html>
