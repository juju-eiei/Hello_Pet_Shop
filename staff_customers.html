<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Staff</title>
    <link rel="stylesheet" href="/css/admin_styles.css">
    <link rel="stylesheet" href="/css/staff_mobile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; background-color: #f8fafc; }
        
        .search-container-staff {
            background-color: #ffffff;
            border-radius: 50px;
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            padding: 12px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            width: 100%; max-width: 500px;
        }
        .search-container-staff input {
            background-color: transparent;
            color: #1e293b;
            border: none;
            outline: none;
            width: 100%;
            margin-left: 12px;
            font-size: 15px;
        }

        /* Customer List Layout */
        .customers-container {
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 0 0 12px 12px;
        }
        
        .customer-row {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s;
            cursor: pointer;
        }
        
        .customer-row:hover {
            background-color: #f8fafc;
        }
        
        .customer-row:last-child {
            border-bottom: none;
        }

        .col-name { flex: 2; display: flex; align-items: center; gap: 12px; min-width: 0; }
        .col-contact { flex: 2; display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #64748b; }
        .col-points { flex: 1; font-weight: 600; color: #f59e0b; display: flex; align-items: center; gap: 6px; }
        .col-pets { flex: 2; font-size: 13px; color: #334155; display: flex; align-items: center; gap: 6px; }
        .col-action { flex: 1; text-align: right; display: flex; justify-content: flex-end; }

        .customer-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #edf2f7;
            color: #2f5d3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }
        
        .customer-name {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .customer-id {
            font-size: 12px;
            color: #94a3b8;
        }

        .btn-view-profile {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            pointer-events: none;
        }
        
        .customer-row:hover .btn-view-profile {
            background-color: #2f5d3a;
            color: white;
            border-color: #2f5d3a;
        }
        
        .mobile-stats-row {
            display: contents;
        }

        /* Mobile specific overrides */
        @media (max-width: 768px) {
            .table-header { display: none !important; }
            .stock-table { background: transparent !important; box-shadow: none !important; padding: 0 !important; border: none !important; }
            .page-header { margin-bottom: 20px; }
            
            .customers-container {
                gap: 12px;
                background: transparent;
            }
            .customer-row {
                background: #ffffff;
                flex-direction: column;
                align-items: flex-start;
                padding: 16px;
                border: 1px solid #e2e8f0;
                border-radius: 16px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.02);
                gap: 12px;
            }
            .col-name { width: 100%; }
            .col-contact { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 12px; padding-left: 56px; }
            .col-points, .col-pets { display: inline-flex; width: auto; padding-left: 0; }
            .col-action { display: none; }
            
            .mobile-stats-row {
                display: flex;
                gap: 16px;
                padding-left: 56px;
                width: 100%;
                margin-top: 4px;
            }
        }
    </style>

    <!-- Mobile User-Agent Check -->
    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            document.documentElement.classList.add('mobile-device');
        }
    </script>
</head>
<body>
    <div class="admin-wrapper">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <i class="fas fa-bars hamburger-btn" onclick="toggleSidebar()"></i>
            <h2>Customers</h2>
            <i class="fas fa-bell" style="font-size: 20px; cursor: pointer;"></i>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header" style="background-color: #3b5030;">
                <i class="fas fa-paw"></i>
                <span>Hello Pet Shop</span>
            </div>
            <nav class="sidebar-menu">
                <div style="padding: 10px 24px; font-size: 12px; color: #3b82f6; font-weight: 600;">Staff</div>
                <a href="staff_profile.html" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Profile</span>
                </a>
                
                <div class="menu-group">
                    <a href="#" class="menu-item" onclick="toggleSubmenu(this)">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                        <i class="fas fa-chevron-down menu-arrow"></i>
                    </a>
                    <div class="submenu">
                        <a href="staff_stock.html">Stock Management</a>
                        <a href="staff_promotions.html">Promotions</a>
                    </div>
                </div>

                <a href="staff_orders.html" class="menu-item">
                    <i class="fas fa-file-invoice"></i>
                    <span>Orders</span>
                </a>
                <a href="staff_customers.html" class="menu-item active">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="#" class="menu-item logout-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Sidebar Overlay (Mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- Main Content -->
        <main class="main-content" style="background:#ffffff; height: 100%; overflow-y: auto; padding-bottom: 80px;">
            <div class="page-header">
                <h1>Customer Management</h1>
            </div>

            <!-- Search -->
            <div class="staff-stock-search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search customers by name, phone, or email...">
            </div>

            <!-- Table -->
            <div class="stock-table">
                <div class="table-header" style="display: flex; padding: 16px 24px; border-bottom: 1px solid #e2e8f0; background-color: #f8fafc; border-top-left-radius: 12px; border-top-right-radius: 12px;">
                    <span style="flex: 2;">Customer Name</span>
                    <span style="flex: 2;">Contact Info</span>
                    <span style="flex: 1;">Reward Points</span>
                    <span style="flex: 2;">Pets</span>
                    <span style="flex: 1; text-align: right;">Action</span>
                </div>
                <div id="customersContainer">
                    <div style="padding: 50px; text-align: center; color: #718096;">Loading customers...</div>
                </div>
            </div>
        </main>
        
        <!-- Bottom Navigation for Mobile -->
        <nav class="bottom-nav">
            <a href="staff_stock.html" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Stock</span>
            </a>
            <a href="staff_customers.html" class="nav-item active">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="staff_orders.html" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>Orders</span>
            </a>
            <a href="staff_profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="/js/utils.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function toggleSubmenu(el) {
            const group = el.closest('.menu-group');
            group.classList.toggle('open');
            localStorage.setItem('staffProductsMenuOpen', group.classList.contains('open'));
        }

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            const role = user ? (user.role_name || '').toLowerCase() : '';
            if (!user || role === 'customer') {
                window.location.href = '/login.html';
                return null;
            }
            return user;
        }

        // Fetch Customers
        let allCustomers = [];

        async function loadCustomers() {
            try {
                const res = await fetch('/api/customers');
                const json = await res.json();
                if (res.ok) {
                    allCustomers = json.data;
                    renderCustomers(allCustomers);
                } else {
                    document.getElementById('customersContainer').innerHTML = `<div style="padding: 50px; text-align: center; color: #ef4444;">Error: ${json.message}</div>`;
                }
            } catch (error) {
                document.getElementById('customersContainer').innerHTML = `<div style="padding: 50px; text-align: center; color: #ef4444;">Connection failed</div>`;
            }
        }

        function renderCustomers(data) {
            const container = document.getElementById('customersContainer');
            // Hide the table-header on mobile
            const oldHeader = document.querySelector('.table-header');
            if (oldHeader && window.innerWidth <= 768) oldHeader.style.display = 'none';

            if (data.length === 0) {
                container.innerHTML = `<div style="padding: 50px; text-align: center; color: #64748b; font-weight: 500;">No customers found.</div>`;
                return;
            }

            container.innerHTML = '<div class="customers-container">' + data.map(c => {
                const initial = c.name ? c.name.charAt(0).toUpperCase() : '?';
                const idStr = 'CUS-' + String(c.customer_id).padStart(4, '0');
                const petsLabel = c.pet_count > 0 ? `${c.pet_count} Pets <span style="font-weight:400; color:#64748b; font-size:11px;">(${c.pet_types || ''})</span>` : '0 Pets';
                
                return `
                    <div class="customer-row" onclick="viewCustomer(${c.customer_id})">
                        <div class="col-name">
                            <div class="customer-avatar">${initial}</div>
                            <div style="min-width: 0;">
                                <div class="customer-name">${c.name}</div>
                                <div class="customer-id">${idStr}</div>
                            </div>
                        </div>
                        <div class="col-contact">
                            <div style="display: flex; align-items: center; gap: 6px;"><i class="far fa-envelope" style="width: 14px; text-align: center;"></i> <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${c.email || '-'}</span></div>
                            <div style="display: flex; align-items: center; gap: 6px;"><i class="fas fa-phone-alt" style="width: 14px; text-align: center;"></i> <span>${c.phone || '-'}</span></div>
                        </div>
                        <div class="mobile-stats-row">
                            <div class="col-points">
                                <i class="fas fa-star"></i> ${c.points} Pts
                            </div>
                            <div class="col-pets">
                                <i class="fas fa-paw" style="color: #2f5d3a;"></i> ${petsLabel}
                            </div>
                        </div>
                        <div class="col-action">
                            <button class="btn-view-profile">View</button>
                        </div>
                    </div>
                `;
            }).join('') + '</div>';
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allCustomers.filter(c => 
                c.name.toLowerCase().includes(val) || 
                (c.phone && c.phone.includes(val)) ||
                (c.email && c.email.toLowerCase().includes(val))
            );
            renderCustomers(filtered);
        });

        function viewCustomer(id) {
            window.location.href = `staff_customer_details.html?id=${id}`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const menuGroup = document.querySelector('.menu-group');
            if (menuGroup) {
                const isOpen = localStorage.getItem('staffProductsMenuOpen');
                if (isOpen === 'true') menuGroup.classList.add('open');
                else if (isOpen === 'false') menuGroup.classList.remove('open');
            }

            const user = checkAuth();
            if (user) {
                loadCustomers();
            }

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('user');
                    window.location.href = '/login.html';
                });
            }
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            if(!toast) return;
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }
    </script>
</body>
</html>
