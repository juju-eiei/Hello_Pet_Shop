<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Profile - Hello Pet Shop</title>
    <link rel="stylesheet" href="/css/admin_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-header {
            background: linear-gradient(135deg, #9d295b 0%, #b84e7a 100%);
            border-radius: 16px;
            padding: 32px;
            color: white;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            box-shadow: 0 10px 15px -3px rgba(184, 78, 122, 0.3);
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .profile-info h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
        }
        .profile-stats {
            display: flex;
            gap: 24px;
            margin-top: 16px;
        }
        .stat-item {
            background-color: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
        }

        /* Pets Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-header h3 {
            font-size: 18px;
            color: #1e293b;
            margin: 0;
        }
        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .pet-card {
            background-color: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            position: relative;
        }
        .pet-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f1f5f9;
        }
        .pet-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background-color: #fce7f3;
            color: #db2777;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .pet-icon.cat { background-color: #fef3c7; color: #d97706; }
        .pet-icon.dog { background-color: #e0e7ff; color: #4338ca; }
        .pet-icon.bird { background-color: #dcfce7; color: #15803d; }

        .pet-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            color: #475569;
        }
        .pet-actions {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 8px;
        }
        .action-icon {
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
        }
        .action-icon:hover { color: #3b82f6; }
        .action-icon.delete:hover { color: #ef4444; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background-color: white;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 32px;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 24px; right: 24px;
            cursor: pointer;
            font-size: 20px;
            color: #64748b;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group.full { grid-column: 1 / -1; }

        /* Premium Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            outline: none;
            font-family: inherit;
        }
        .btn-secondary {
            background-color: white;
            color: #475569;
            border: 1px solid #cbd5e1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-secondary:hover {
            background-color: #f8fafc;
            color: #1e293b;
            border-color: #94a3b8;
        }
        .btn-primary {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }
        .btn-primary:hover {
            background-color: #2563eb;
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-paw"></i>
                <span>Hello Pet Shop</span>
            </div>
            <nav class="sidebar-menu">
                <div style="padding: 10px 24px; font-size: 12px; color: #3b82f6; font-weight: 600;">Admin</div>
                <a href="admin_dashboard.html" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <div class="menu-group">
                    <a class="menu-item" onclick="toggleSubmenu(this)">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                        <i class="fas fa-chevron-down menu-arrow"></i>
                    </a>
                    <div class="submenu">
                        <a href="admin_stock.html">Stock Management</a>
                        <a href="admin_product_management.html">Product Management</a>
                        <a href="admin_promotions.html">Promotions</a>
                    </div>
                </div>
                <a href="admin_staff.html" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>Staff Management</span>
                </a>
                <a href="admin_orders.html" class="menu-item">
                    <i class="fas fa-file-invoice"></i>
                    <span>Orders</span>
                </a>
                <a href="admin_customers.html" class="menu-item active">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="#" class="menu-item logout-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header" style="margin-bottom: 24px;">
                <button class="btn btn-secondary" onclick="window.location.href='admin_customers.html'" style="margin-right: 16px;">
                    <i class="fas fa-arrow-left"></i> Back to List
                </button>
                <h1>Customer Profile</h1>
            </div>

            <div id="loading" style="text-align: center; padding: 50px; color: #64748b;">Loading profile...</div>

            <div id="contentBlock" style="display: none;">
                <!-- Profile Header -->
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="far fa-user"></i>
                    </div>
                    <div class="profile-info">
                        <h2 id="cName">Customer Name</h2>
                        <div style="font-size: 14px; opacity: 0.9;">
                            <i class="fas fa-phone-alt"></i> <span id="cPhone"></span> &nbsp;&nbsp;|&nbsp;&nbsp; 
                            <i class="far fa-envelope"></i> <span id="cEmail"></span>
                        </div>
                        <div class="profile-stats">
                            <div class="stat-item"><i class="fas fa-star" style="color: #fbbf24;"></i> <strong id="cPoints">0</strong> Points</div>
                            <div class="stat-item"><i class="fas fa-shopping-bag"></i> <strong id="cOrders">0</strong> Orders</div>
                            <div class="stat-item"><i class="fas fa-calendar-alt"></i> Joined <span id="cJoined"></span></div>
                        </div>
                    </div>
                </div>

                <!-- Pets Section -->
                <div class="section-header">
                    <h3><i class="fas fa-paw" style="color: #6366f1;"></i> Registered Pets</h3>
                    <button class="btn btn-primary" onclick="openPetModal()"><i class="fas fa-plus"></i> Add Pet</button>
                </div>

                <div class="pets-grid" id="petsContainer">
                    <!-- Pets rendered here -->
                </div>
            </div>

        </main>
    </div>

    <!-- Pet Modal -->
    <div class="modal" id="petModal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closePetModal()"></i>
            <h2 id="modalTitle" style="margin-top: 0; margin-bottom: 24px; font-size: 20px;">Add Pet</h2>
            
            <form id="petForm">
                <input type="hidden" id="petId">
                <input type="hidden" id="customerId">
                
                <div class="form-grid">
                    <div class="form-group full">
                        <label class="form-label">Pet Name <span style="color: red">*</span></label>
                        <input type="text" class="form-control" id="petName" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Pet Type <span style="color: red">*</span></label>
                        <select class="form-control" id="petType" required>
                            <option value="Dog">Dog</option>
                            <option value="Cat">Cat</option>
                            <option value="Bird">Bird</option>
                            <option value="Fish">Fish</option>
                            <option value="Rabbit">Rabbit</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Breed</label>
                        <input type="text" class="form-control" id="petBreed" placeholder="e.g. Golden Retriever">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Birthdate</label>
                        <input type="date" class="form-control" id="petBirthdate">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" step="0.1" class="form-control" id="petWeight" placeholder="0.0">
                    </div>

                    <div class="form-group full">
                        <label class="form-label">Allergy Information</label>
                        <textarea class="form-control" id="petAllergy" rows="2" placeholder="Leave blank if none"></textarea>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
                    <button type="button" class="btn btn-secondary" onclick="closePetModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Pet</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/js/utils.js"></script>
    <script>
        let currentCustomerId = null;
        let petsData = [];

        function toggleSubmenu(element) {
            element.classList.toggle('active');
            const submenu = element.nextElementSibling;
            if (submenu.style.display === 'block') {
                submenu.style.display = 'none';
            } else {
                submenu.style.display = 'block';
            }
        }

        async function loadProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            currentCustomerId = urlParams.get('id');

            if (!currentCustomerId) {
                document.getElementById('loading').innerHTML = '<span style="color: red;">No Customer ID provided.</span>';
                return;
            }

            try {
                const res = await fetch(`/api/customers/details?id=${currentCustomerId}`);
                const json = await res.json();

                if (res.ok) {
                    renderProfile(json.data);
                } else {
                    document.getElementById('loading').innerHTML = `<span style="color: red;">Error: ${json.message}</span>`;
                }
            } catch (err) {
                document.getElementById('loading').innerHTML = '<span style="color: red;">Connection error.</span>';
            }
        }

        function getIconClass(type) {
            const t = type.toLowerCase();
            if (t.includes('cat')) return 'cat fa-cat';
            if (t.includes('dog')) return 'dog fa-dog';
            if (t.includes('bird')) return 'bird fa-crow';
            if (t.includes('fish')) return 'fa-fish';
            return 'fa-paw';
        }

        function renderProfile(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('contentBlock').style.display = 'block';

            document.getElementById('cName').textContent = data.name;
            document.getElementById('cPhone').textContent = data.phone;
            document.getElementById('cEmail').textContent = data.email;
            document.getElementById('cPoints').textContent = data.points.toLocaleString();
            document.getElementById('cOrders').textContent = data.total_orders;
            document.getElementById('cJoined').textContent = data.joined_date;

            petsData = data.pets;
            document.getElementById('customerId').value = data.id;

            renderPets();
        }

        function renderPets() {
            const container = document.getElementById('petsContainer');
            
            if (petsData.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; background: white; border-radius: 12px; color: #94a3b8; border: 2px dashed #e2e8f0;">No pets registered yet. Click "Add Pet" to register one.</div>`;
                return;
            }

            container.innerHTML = petsData.map((p, index) => {
                let ageStr = '-';
                if (p.birthdate && p.birthdate !== '0000-00-00') {
                    const diff = new Date() - new Date(p.birthdate);
                    const ageDt = new Date(diff); 
                    const years = Math.abs(ageDt.getUTCFullYear() - 1970);
                    ageStr = years > 0 ? `${years} years` : 'Under 1 year';
                }

                return `
                <div class="pet-card">
                    <div class="pet-actions">
                        <i class="fas fa-pen action-icon" onclick="openPetModal(${index})"></i>
                        <i class="fas fa-trash-alt action-icon delete" onclick="deletePet(${p.pet_id})"></i>
                    </div>
                    <div class="pet-header">
                        <div class="pet-icon ${getIconClass(p.pet_type)}">
                            <i class="fas ${getIconClass(p.pet_type).split(' ')[1] || 'fa-paw'}"></i>
                        </div>
                        <div>
                            <h4 style="margin: 0; font-size: 18px; color: #1e293b;">${p.pet_name}</h4>
                            <span style="color: #64748b; font-size: 13px;">${p.pet_type} ${p.breed ? '| ' + p.breed : ''}</span>
                        </div>
                    </div>
                    <div class="pet-info">
                        <div><i class="fas fa-weight" style="width: 20px; color: #94a3b8;"></i> ${p.weight ? p.weight + ' kg.' : 'Unspecified'}</div>
                        <div><i class="fas fa-birthday-cake" style="width: 20px; color: #94a3b8;"></i> ${p.birthdate || 'Unknown'} (${ageStr})</div>
                        ${p.allergy_info ? 
                            `<div style="color: #ef4444; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e2e8f0;">
                                <i class="fas fa-exclamation-triangle" style="width: 20px;"></i> <b>Allergies:</b> ${p.allergy_info}
                            </div>` 
                            : ''
                        }
                    </div>
                </div>
                `;
            }).join('');
        }

        function openPetModal(index = null) {
            const form = document.getElementById('petForm');
            form.reset();
            
            if (index !== null) {
                const p = petsData[index];
                document.getElementById('modalTitle').textContent = 'Edit Pet';
                document.getElementById('petId').value = p.pet_id;
                document.getElementById('petName').value = p.pet_name;
                document.getElementById('petType').value = p.pet_type;
                document.getElementById('petBreed').value = p.breed || '';
                document.getElementById('petBirthdate').value = p.birthdate || '';
                document.getElementById('petWeight').value = p.weight || '';
                document.getElementById('petAllergy').value = p.allergy_info || '';
            } else {
                document.getElementById('modalTitle').textContent = 'Add Pet';
                document.getElementById('petId').value = '0';
            }

            document.getElementById('petModal').classList.add('active');
        }

        function closePetModal() {
            document.getElementById('petModal').classList.remove('active');
        }

        document.getElementById('petForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                customer_id: currentCustomerId,
                pet_id: document.getElementById('petId').value,
                pet_name: document.getElementById('petName').value,
                pet_type: document.getElementById('petType').value,
                breed: document.getElementById('petBreed').value,
                birthdate: document.getElementById('petBirthdate').value,
                weight: document.getElementById('petWeight').value,
                allergy_info: document.getElementById('petAllergy').value,
            };

            try {
                const res = await fetch('/api/pets/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                
                if (res.ok) {
                    showToast(json.message, "success");
                    closePetModal();
                    loadProfile(); // Reload
                } else {
                    showToast(json.message || "Failed to save pet", "error");
                }
            } catch (err) {
                showToast("Connection failed", "error");
            }
        });

        async function deletePet(petId) {
            if (!confirm("Are you sure you want to delete this pet?")) return;

            try {
                const res = await fetch('/api/pets/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pet_id: petId, customer_id: currentCustomerId })
                });
                const json = await res.json();
                
                if (res.ok) {
                    showToast(json.message, "success");
                    loadProfile(); // Reload
                } else {
                    showToast(json.message || "Failed to delete", "error");
                }
            } catch (err) {
                showToast("Connection failed", "error");
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
