<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Hello Pet Shop</title>
    <!-- Use Vite to load styles -->
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/js/products.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Kanit', sans-serif; }
        .nav-green { background-color: #2d5a27; }
        .search-blue { background-color: #d8eafa; }
        .btn-green { background-color: #8bb35c; }
        .btn-green:hover { background-color: #7a9e4f; }
        .pagination-active { background-color: #f3f4f6; border-radius: 50%; }
    </style>
</head>
<body class="bg-white min-h-screen">
    <!-- Role Check script -->
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role_name.toLowerCase() !== 'customer') {
            window.location.href = '/login';
        }
    </script>

    <!-- Header / Navbar -->
    <header class="nav-green text-white shadow-md">
        <nav class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-6">
                <!-- Logo -->
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-[#2d5a27]">
                        <i class="fas fa-paw text-lg"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Hello Pet Shop</span>
                </div>
                
                <!-- Nav Links -->
                <div class="hidden md:flex items-center space-x-6 text-sm font-medium">
                    <a href="/home" class="hover:text-gray-200 transition-colors">Home</a>
                    <div class="relative group">
                        <button class="flex items-center space-x-1 hover:text-gray-200 transition-colors">
                            <span>Products</span>
                            <i class="fas fa-chevron-down text-[10px]"></i>
                        </button>
                    </div>
                    <a href="/my-pets" class="hover:text-gray-200 transition-colors">My Pets</a>
                    <a href="/profile" class="hover:text-gray-200 transition-colors">Profile</a>
                    <a href="/order-history" class="hover:text-gray-200 transition-colors">Order History</a>
                    <a href="/contact" class="hover:text-gray-200 transition-colors">Contact Us</a>
                </div>
            </div>

            <!-- Right side icons -->
            <div class="flex items-center space-x-5">
                <button class="relative hover:text-gray-200 transition-colors">
                    <i class="fas fa-shopping-basket text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full hidden">0</span>
                </button>
                <button id="logoutBtn" class="text-sm font-medium hover:text-gray-200 transition-colors">Logout</button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 py-8">
        <!-- Search Section -->
        <div class="mb-8">
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="productSearch" placeholder="Search for products" 
                    class="w-full pl-4 pr-12 py-3 search-blue rounded-xl outline-none text-gray-700 placeholder-gray-500 focus:ring-2 focus:ring-blue-100 transition-all">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
            </div>
            
            <!-- Category Filter -->
            <div class="flex justify-center space-x-3 mt-6">
                <button class="category-btn px-6 py-1.5 search-blue text-sm font-medium rounded-lg hover:bg-blue-200 transition-all active" data-category="all">All</button>
                <button class="category-btn px-6 py-1.5 search-blue text-sm font-medium rounded-lg hover:bg-blue-200 transition-all" data-category="Dog">Dog</button>
                <button class="category-btn px-6 py-1.5 search-blue text-sm font-medium rounded-lg hover:bg-blue-200 transition-all" data-category="Cat">Cat</button>
                <button class="category-btn px-6 py-1.5 search-blue text-sm font-medium rounded-lg hover:bg-blue-200 transition-all" data-category="Bird">Bird</button>
            </div>
        </div>

        <!-- Featured Products -->
        <section class="mb-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-8 ml-2">Featured Products</h2>
            
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-x-6 gap-y-10">
                <!-- Product cards will be loaded here via JS -->
                 <div class="animate-pulse space-y-4">
                    <div class="bg-gray-200 aspect-square rounded-2xl"></div>
                    <div class="h-4 bg-gray-200 rounded w-3/4 mx-auto"></div>
                    <div class="h-4 bg-gray-200 rounded w-1/4 mx-auto"></div>
                 </div>
                 <!-- Skeleton cards -->
            </div>
        </section>

        <!-- Pagination -->
        <div class="flex items-center justify-center space-x-4 text-gray-500 text-sm mt-8 pb-12">
            <button class="hover:text-gray-800 transition-colors"><i class="fas fa-chevron-left"></i></button>
            <button class="w-8 h-8 flex items-center justify-center pagination-active text-gray-800 font-bold">1</button>
            <button class="w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded-full transition-all">2</button>
            <button class="w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded-full transition-all">3</button>
            <button class="w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded-full transition-all">4</button>
            <button class="hover:text-gray-800 transition-colors"><i class="fas fa-chevron-right"></i></button>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl shadow-xl transition-all duration-500 opacity-0 translate-y-4 pointer-events-none z-50"></div>
</body>
</html>
