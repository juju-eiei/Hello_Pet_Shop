<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotions - Hello Pet Shop</title>
    <link rel="stylesheet" href="/css/admin_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Mobile User-Agent Check -->
    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            document.documentElement.classList.add('mobile-device');
        }
    </script>
</head>
<body>
    <div class="admin-wrapper">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <i class="fas fa-bars" id="hamburgerBtn"></i>
            <h2>Promotions</h2>
            <i class="fas fa-bell"></i>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-paw"></i>
                <span>Hello Pet Shop</span>
            </div>
            <nav class="sidebar-menu">
                <div style="padding: 10px 24px; font-size: 12px; color: #3b82f6; font-weight: 600;">Admin</div>
                <a href="admin_dashboard.html" class="desktop-only-menu menu-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <div class="menu-group open">
                    <a class="menu-item active" onclick="toggleSubmenu(this)">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                        <i class="fas fa-chevron-down menu-arrow"></i>
                    </a>
                    <div class="submenu">
                        <a href="admin_stock.html">Stock Management</a>
                        <a href="admin_product_management.html" class="desktop-only-menu">Product Management</a>
                        <a href="admin_promotions.html" class="active">Promotions</a>
                    </div>
                </div>
                <a href="admin_staff.html" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>Staff Management</span>
                </a>
                <a href="admin_orders.html" class="menu-item">
                    <i class="fas fa-file-invoice"></i>
                    <span>Orders</span>
                </a>
                <a href="admin_customers.html" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="#" class="menu-item logout-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h1>Promotions</h1>
                <button class="save-btn" id="addPromoBtn" style="padding: 10px 24px; font-size: 14px; background: #94ad5e;">
                    <i class="fas fa-plus" style="margin-right: 8px;"></i>
                    Create New Promotion
                </button>
            </div>

            <!-- Search -->
            <div class="search-container" style="background: #dbeafe; border-radius: 12px; margin-bottom: 24px;">
                <i class="fas fa-search" style="color: #60a5fa;"></i>
                <input type="text" id="searchInput" placeholder="Search promotions..." style="background: transparent;">
            </div>

            <!-- Table -->
            <div class="stock-table">
                <div class="table-header">
                    <span style="flex: 2;">Promotion Name</span>
                    <span style="flex: 1; text-align: center;">Discount Type</span>
                    <span style="flex: 2; text-align: center;">Validity Period</span>
                    <span style="flex: 1; text-align: right;">Actions</span>
                </div>
                <div id="promoContainer">
                    <div style="padding: 50px; text-align: center; color: #718096;">กำลังโหลดข้อมูล...</div>
                </div>
            </div>
        </main>

        <!-- Floating Add Button for Mobile -->
        <button class="fab-add" id="mobileAddBtn">
            <i class="fas fa-plus"></i>
        </button>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="admin_dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="admin_orders.html" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>Orders</span>
            </a>
            <a href="admin_stock.html" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Stock</span>
            </a>
            <a href="admin_customers.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="admin_promotions.html" class="nav-item active">
                <i class="fas fa-bullhorn"></i>
                <span>Promotions</span>
            </a>
        </nav>
    </div>

    <!-- Promotion Modal -->
    <div id="promoModal" class="modal-overlay">
        <div class="modal-card" style="max-width: 500px; text-align: left;">
            <h2 class="modal-title" id="promoModalTitle" style="margin-bottom: 20px;">Create Promotion</h2>
            <form id="promoForm">
                <input type="hidden" id="promo_id" name="id">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: bold; font-size: 14px;">Promotion Name</label>
                    <input type="text" id="promo_name" name="code" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
                </div>
                <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: bold; font-size: 14px;">Discount Type</label>
                        <select id="discount_type" name="discount_type" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
                            <option value="1">Percentage (%)</option>
                            <option value="2">Fixed Amount (฿)</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: bold; font-size: 14px;">Discount Value</label>
                        <input type="number" step="0.01" id="discount_value" name="discount_value" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
                    </div>
                </div>
                <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: bold; font-size: 14px;">Start Date</label>
                        <input type="date" id="start_date" name="start_date" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: bold; font-size: 14px;">End Date</label>
                        <input type="date" id="end_date" name="end_date" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 8px; color: #4a5568; cursor: pointer;">
                        <input type="checkbox" id="is_active" name="is_active" value="1" checked>
                        <span style="font-weight: bold; font-size: 14px;">Active Promotion</span>
                    </label>
                </div>
                <div class="modal-btns" style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="modal-btn modal-btn-cancel" onclick="closePromoModal()" style="padding: 10px 20px; border-radius: 8px; border: none; background: #e2e8f0; cursor: pointer;">Cancel</button>
                    <button type="submit" class="modal-btn modal-btn-confirm" id="savePromoBtn" style="padding: 10px 20px; border-radius: 8px; border: none; background: #94ad5e; color: white; cursor: pointer;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let currentKeyword = '';
        let currentPromotions = [];

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role_name.toLowerCase() !== 'admin') {
                window.location.href = 'login.html';
            }
        }

        async function fetchPromotions() {
            try {
                const response = await fetch(`api/promotions?keyword=${encodeURIComponent(currentKeyword)}`);
                const result = await response.json();
                if (response.ok) {
                    currentPromotions = result.data;
                    renderPromotions(result.data);
                }
            } catch (error) {
                showToast("เกิดข้อผิดพลาดในการดึงข้อมูล", "error");
            }
        }

        function renderPromotions(promos) {
            const container = document.getElementById('promoContainer');
            if (promos.length === 0) {
                container.innerHTML = '<div style="padding: 50px; text-align: center; color: #718096;">ไม่พบโปรโมชัน</div>';
                return;
            }

            container.innerHTML = promos.map(p => {
                const discount = (p.discount_type == 1 || p.discount_type == 2 || p.discount_type === 'percent') ? `${parseFloat(p.discount_value)}% off` : `฿${parseFloat(p.discount_value)} off`;
                const validity = `${p.start_date} - ${p.end_date}`;
                
                return `
                    <div class="product-row" style="display: flex; align-items: center; width: 100%;">
                        <div class="product-details" style="flex: 2;">
                            <div class="product-name">${p.promo_name}</div>
                        </div>
                        <div class="stock-status" style="flex: 1; text-align: center; color: #10b981; font-weight: 700;">
                            ${discount}
                        </div>
                        <div style="flex: 2; text-align: center; font-size: 14px; color: #64748b;">
                            <i class="far fa-calendar-alt" style="margin-right: 6px;"></i> ${validity}
                        </div>
                        <div class="stock-actions" style="flex: 1; justify-content: flex-end; display: flex; gap: 12px;">
                            <a href="#" onclick="editPromo(${p.promo_id})" class="action-link" style="width: 42px; height: 42px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 12px; background-color: #ebfbee; color: #2b7a3b; font-size: 18px; text-decoration: none; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" title="Edit">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a href="#" onclick="deletePromo(${p.promo_id})" class="action-link" style="width: 42px; height: 42px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 12px; background-color: #fff0f2; color: #e03131; font-size: 18px; text-decoration: none; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" title="Delete">
                                <i class="fas fa-trash-alt"></i>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function deletePromo(id) {
            if (!confirm("ยืนยันการลบโปรโมชัน?")) return;
            try {
                const response = await fetch(`api/promotions/delete?id=${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast("ลบสำเร็จ", "success");
                    fetchPromotions();
                }
            } catch (error) {
                showToast("เกิดข้อผิดพลาด", "error");
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentKeyword = e.target.value;
            fetchPromotions();
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);

                function toggleSubmenu(el) {
            const group = el.closest('.menu-group');
            group.classList.toggle('open');
            localStorage.setItem('productsMenuOpen', group.classList.contains('open'));
        }

        // Restore submenu state
        document.addEventListener('DOMContentLoaded', () => {
            const menuGroup = document.querySelector('.menu-group');
            if (menuGroup) {
                const isOpen = localStorage.getItem('productsMenuOpen');
                if (isOpen === 'true') menuGroup.classList.add('open');
                else if (isOpen === 'false') menuGroup.classList.remove('open');
            }
        });

        const promoModal = document.getElementById('promoModal');
        const promoForm = document.getElementById('promoForm');

        document.getElementById('addPromoBtn').addEventListener('click', () => {
            document.getElementById('promoModalTitle').textContent = "Create Promotion";
            promoForm.reset();
            document.getElementById('promo_id').value = '';
            document.getElementById('is_active').checked = true;
            openPromoModal();
        });

        function openPromoModal() {
            promoModal.style.display = 'flex';
            setTimeout(() => promoModal.classList.add('show'), 10);
        }

        function closePromoModal() {
            promoModal.classList.remove('show');
            setTimeout(() => promoModal.style.display = 'none', 300);
        }

        function editPromo(id) {
            const promo = currentPromotions.find(p => p.promo_id == id);
            if (!promo) return;
            document.getElementById('promoModalTitle').textContent = "Edit Promotion";
            document.getElementById('promo_id').value = promo.promo_id;
            document.getElementById('promo_name').value = promo.promo_name;
            document.getElementById('discount_type').value = promo.discount_type;
            document.getElementById('discount_value').value = parseFloat(promo.discount_value);
            document.getElementById('start_date').value = promo.start_date.split(' ')[0];
            document.getElementById('end_date').value = promo.end_date.split(' ')[0];
            document.getElementById('is_active').checked = (promo.is_active == 1);
            openPromoModal();
        }

        promoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(promoForm);
            const data = Object.fromEntries(formData.entries());
            data.is_active = document.getElementById('is_active').checked ? 1 : 0;
            
            data.start_date = data.start_date + ' 00:00:00';
            data.end_date = data.end_date + ' 23:59:59';
            
            const isUpdate = !!data.id;
            const url = isUpdate ? `api/promotions/update?id=${data.id}` : `api/promotions`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showToast(isUpdate ? "อัปเดตสำเร็จ" : "สร้างสำเร็จ", "success");
                    closePromoModal();
                    fetchPromotions();
                } else {
                    const res = await response.json();
                    showToast(res.message || "เกิดข้อผิดพลาด", "error");
                }
            } catch (error) {
                showToast("เกิดข้อผิดพลาดในการเชื่อมต่อ", "error");
            }
        });

        checkAuth();
        fetchPromotions();
    </script>
</body>
</html>
