<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotions - Hello Pet Shop</title>
    <link rel="stylesheet" href="assets/css/admin_styles.css?v=3.5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <i class="fas fa-bars" id="hamburgerBtn"></i>
            <h2>Promotions</h2>
            <i class="fas fa-bell"></i>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-paw"></i>
                <span>Hello Pet Shop</span>
            </div>
            <nav class="sidebar-menu">
                <a href="#" class="menu-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <div class="menu-group">
                    <a href="admin_stock.html" class="menu-item active">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                    </a>
                    <div class="submenu">
                        <a href="admin_stock.html">Stock Management</a>
                        <a href="admin_product_management.html">Product Management</a>
                        <a href="admin_promotions.html" class="active">Promotions</a>
                    </div>
                </div>
                <a href="#" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>Staff Management</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-file-invoice"></i>
                    <span>Orders</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="#" class="menu-item logout-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h1>Promotions</h1>
                <button class="save-btn" id="addPromoBtn" style="padding: 10px 24px; font-size: 14px; background: #94ad5e;">
                    <i class="fas fa-plus" style="margin-right: 8px;"></i>
                    Create New Promotion
                </button>
            </div>

            <!-- Search -->
            <div class="search-container" style="background: #dbeafe; border-radius: 12px; margin-bottom: 24px;">
                <i class="fas fa-search" style="color: #60a5fa;"></i>
                <input type="text" id="searchInput" placeholder="Search promotions..." style="background: transparent;">
            </div>

            <!-- Table -->
            <div class="stock-table">
                <div class="table-header">
                    <span style="flex: 2;">Promotion Name</span>
                    <span style="flex: 1; text-align: center;">Discount Type</span>
                    <span style="flex: 2; text-align: center;">Validity Period</span>
                    <span style="flex: 1; text-align: right;">Actions</span>
                </div>
                <div id="promoContainer">
                    <div style="padding: 50px; text-align: center; color: #718096;">กำลังโหลดข้อมูล...</div>
                </div>
            </div>
        </main>

        <!-- Floating Add Button for Mobile -->
        <button class="fab-add" id="mobileAddBtn">
            <i class="fas fa-plus"></i>
        </button>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>Orders</span>
            </a>
            <a href="admin_stock.html" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Stock</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="admin_promotions.html" class="nav-item active">
                <i class="fas fa-bullhorn"></i>
                <span>Promotions</span>
            </a>
        </nav>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let currentKeyword = '';

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role_name.toLowerCase() !== 'admin') {
                window.location.href = 'login.html';
            }
        }

        async function fetchPromotions() {
            try {
                const response = await fetch(`api/promotions?keyword=${encodeURIComponent(currentKeyword)}`);
                const result = await response.json();
                if (response.ok) renderPromotions(result.data);
            } catch (error) {
                showToast("เกิดข้อผิดพลาดในการดึงข้อมูล", "error");
            }
        }

        function renderPromotions(promos) {
            const container = document.getElementById('promoContainer');
            if (promos.length === 0) {
                container.innerHTML = '<div style="padding: 50px; text-align: center; color: #718096;">ไม่พบโปรโมชัน</div>';
                return;
            }

            container.innerHTML = promos.map(p => {
                const discount = p.discount_type === 'percent' ? `${parseFloat(p.discount_value)}% off` : `$${parseFloat(p.discount_value)} off`;
                const validity = `${p.start_date} - ${p.end_date}`;
                
                return `
                    <div class="product-row">
                        <div class="product-details" style="grid-area: info;">
                            <div class="product-name">${p.code}</div>
                        </div>
                        <div class="stock-status" style="grid-area: status; color: #10b981;">
                            ${discount}
                        </div>
                        <div style="grid-column: 2; font-size: 13px; color: #64748b; margin-bottom: 5px;">
                            <i class="far fa-calendar-alt"></i> ${validity}
                        </div>
                        <div class="stock-actions">
                            <a href="#" class="action-link edit-link" style="color: #60a5fa;">Edit</a>
                            <span style="color: #e2e8f0; margin: 0 5px;">|</span>
                            <a href="#" onclick="deletePromo(${p.id})" class="action-link delete-link" style="color: #ef4444;">Delete</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function deletePromo(id) {
            if (!confirm("ยืนยันการลบโปรโมชัน?")) return;
            try {
                const response = await fetch(`api/promotions/delete?id=${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast("ลบสำเร็จ", "success");
                    fetchPromotions();
                }
            } catch (error) {
                showToast("เกิดข้อผิดพลาด", "error");
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentKeyword = e.target.value;
            fetchPromotions();
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);

        checkAuth();
        fetchPromotions();
    </script>
</body>
</html>
