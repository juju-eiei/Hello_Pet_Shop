<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Hello Pet Shop</title>
    <link rel="stylesheet" href="/css/admin_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-pill {
            padding: 6px 16px; 
            border-radius: 50px; 
            font-size: 13px; 
            font-weight: 500; 
            width: auto;
            min-width: 110px;
            text-align: center;
            display: inline-block;
        }
        .status-pill.pending { background-color: #fef08a; color: #854d0e; }
        .status-pill.processing { background-color: #bfdbfe; color: #1e3a8a; }
        .status-pill.intransit { background-color: #fce7f3; color: #9d174d; }
        .status-pill.completed { background-color: #dcfce7; color: #166534; }
        .status-pill.cancelled { background-color: #fecdd3; color: #9f1239; }
        
        .table-cell-text {
            color: #64748b;
            font-size: 14px;
        }
        .table-header span {
            color: #1e293b;
            font-weight: 600;
        }
        .search-container {
            background-color: #cce4f7;
            border-radius: 8px;
            border: none;
            margin-bottom: 24px;
        }
        .search-container input {
            background-color: transparent;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <i class="fas fa-bars" id="hamburgerBtn"></i>
            <h2>Orders</h2>
            <i class="fas fa-bell"></i>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-paw"></i>
                <span>Hello Pet Shop</span>
            </div>
            <nav class="sidebar-menu">
                <div style="padding: 10px 24px; font-size: 12px; color: #3b82f6; font-weight: 600;">Admin</div>
                <a href="admin_dashboard.html" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <div class="menu-group">
                    <a class="menu-item" onclick="toggleSubmenu(this)">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                        <i class="fas fa-chevron-down menu-arrow"></i>
                    </a>
                    <div class="submenu">
                        <a href="admin_stock.html">Stock Management</a>
                        <a href="admin_product_management.html">Product Management</a>
                        <a href="admin_promotions.html">Promotions</a>
                    </div>
                </div>
                <a href="admin_staff.html" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>Staff Management</span>
                </a>
                <a href="admin_orders.html" class="menu-item active">
                    <i class="fas fa-file-invoice"></i>
                    <span>Orders</span>
                </a>
                <a href="admin_customers.html" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="#" class="menu-item logout-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Orders</h1>
            </div>

            <!-- Search -->
            <div class="search-container">
                <i class="fas fa-search" style="color: #64748b;"></i>
                <input type="text" id="searchInput" placeholder="Search orders by ID or status...">
            </div>

            <!-- Table -->
            <div class="stock-table">
                <div class="table-header">
                    <span style="flex: 1.5;">Order Date</span>
                    <span style="flex: 2;">Order Number</span>
                    <span style="flex: 1.5; text-align: left;">Total Amount</span>
                    <span style="flex: 1; text-align: center;">Status</span>
                    <span style="flex: 1; text-align: right;">Actions</span>
                </div>
                <div id="ordersContainer">
                    <div style="padding: 50px; text-align: center; color: #718096;">กำลังโหลดข้อมูล...</div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation for Mobile -->
        <nav class="bottom-nav">
            <a href="admin_dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="admin_orders.html" class="nav-item active">
                <i class="fas fa-file-invoice"></i>
                <span>Orders</span>
            </a>
            <a href="admin_stock.html" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Stock</span>
            </a>
            <a href="admin_customers.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="admin_promotions.html" class="nav-item">
                <i class="fas fa-bullhorn"></i>
                <span>Promotions</span>
            </a>
        </nav>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let allOrders = [];

        async function fetchOrders() {
            try {
                const res = await fetch('/api/orders');
                if (!res.ok) throw new Error('Network error');
                const json = await res.json();
                allOrders = json.data || [];
                renderOrders();
            } catch (e) {
                console.error(e);
                document.getElementById('ordersContainer').innerHTML = '<div style="padding: 50px; text-align: center; color: #ef4444;">เกิดข้อผิดพลาดในการดึงข้อมูล</div>';
            }
        }

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role_name.toLowerCase() !== 'admin') {
                window.location.href = 'login.html';
            }
        }

        function getStatusClass(status) {
            return status.toLowerCase().replace(" ", "");
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            
            const filteredOrders = allOrders.filter(o => 
                o.number.toLowerCase().includes(keyword) || 
                o.status.toLowerCase().includes(keyword) ||
                o.date.includes(keyword)
            );

            if (filteredOrders.length === 0) {
                container.innerHTML = '<div style="padding: 50px; text-align: center; color: #718096;">ไม่พบคำสั่งซื้อ</div>';
                return;
            }

            container.innerHTML = filteredOrders.map(o => `
                <div class="product-row" style="display: flex; align-items: center; width: 100%;">
                    <div class="table-cell-text" style="flex: 1.5;">${o.date}</div>
                    <div class="table-cell-text" style="flex: 2; color: #334155; font-weight: 500;">${o.number}</div>
                    <div class="table-cell-text" style="flex: 1.5; text-align: left;">$${o.amount.toFixed(2)}</div>
                    <div style="flex: 1; text-align: center; display: flex; justify-content: center;">
                        <span class="status-pill ${getStatusClass(o.status)}">${o.status}</span>
                    </div>
                    <div style="flex: 1; display: flex; justify-content: flex-end;">
                        <a href="admin_order_details.html?id=${o.id}" class="action-link" style="width: 38px; height: 38px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 10px; background-color: #eff6ff; color: #3b82f6; font-size: 16px; text-decoration: none; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" title="View Order Details">
                            <i class="fas fa-eye"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        document.getElementById('searchInput').addEventListener('input', renderOrders);

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);

        function toggleSubmenu(el) {
            el.closest('.menu-group').classList.toggle('open');
        }

        // Initialize
        checkAuth();
        fetchOrders();
    </script>
</body>
</html>
