<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Hello Pet Shop</title>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/js/order-history.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Kanit', sans-serif; }
        .nav-green { background-color: #2d5a27; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="nav-green text-white shadow-md">
        <nav class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-6">
                <!-- Logo -->
                <a href="/home" class="flex items-center space-x-2 hover:opacity-90 transition-opacity">
                    <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-[#2d5a27]">
                        <i class="fas fa-paw text-lg"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Hello Pet Shop</span>
                </a>
                
                <!-- Nav Links -->
                <div class="hidden md:flex items-center space-x-6 text-sm font-medium">
                    <a href="/home" class="hover:text-gray-200 transition-colors">Home</a>
                    <a href="/my-pets" class="hover:text-gray-200 transition-colors">My Pets</a>
                    <a href="/order-history" class="text-white font-bold pb-1 border-b-2 border-white">Order History</a>
                    <a href="/contact" class="hover:text-gray-200 transition-colors">Contact Us</a>
                </div>
            </div>

            <!-- Right side icons -->
            <div class="flex items-center space-x-8">
                <a href="/cart" class="relative hover:text-gray-200 transition-colors block">
                    <i class="fas fa-shopping-basket text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full hidden">0</span>
                </a>
                <div class="relative">
                    <button id="navProfileMenuBtn" class="block w-8 h-8 rounded-full overflow-hidden bg-gray-100 border border-transparent shadow-sm hover:border-white transition-all focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-[#2d5a27]">
                        <div id="navDefaultAvatar" class="w-full h-full flex items-center justify-center bg-gray-50">
                            <i class="fas fa-user text-gray-400 text-[15px]"></i>
                        </div>
                        <img id="navProfileImage" src="" alt="Profile" class="w-full h-full object-cover hidden">
                    </button>
                    
                    <!-- Dropdown Menu -->
                    <div id="navProfileDropdown" class="absolute right-0 mt-3 w-44 bg-white rounded-xl shadow-xl py-2 border border-gray-100 hidden z-50 transform origin-top-right transition-all">
                        <a href="/profile" class="block px-4 py-2.5 text-[15px] font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                            <i class="fa-regular fa-user mr-2 text-gray-500"></i> ข้อมูลโปรไฟล์
                        </a>
                        <div class="border-t border-gray-100 my-1"></div>
                        <button id="logoutBtn" class="w-full text-left px-4 py-2.5 text-[15px] font-medium text-red-600 hover:bg-red-50 transition-colors">
                            <i class="fas fa-sign-out-alt mr-2 text-red-500"></i> ออกจากระบบ
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-10 pb-20">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Order History</h1>
            <p class="text-gray-500 mt-1">Track and manage your past orders.</p>
        </div>

        <div id="ordersContainer" class="space-y-6">
            <!-- Orders will be loaded here via JS -->
            <!-- Skeleton Loading -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 animate-pulse">
                <div class="flex justify-between items-start mb-4">
                    <div class="space-y-2">
                        <div class="h-5 bg-gray-200 rounded w-32"></div>
                        <div class="h-4 bg-gray-200 rounded w-24"></div>
                    </div>
                    <div class="h-6 bg-gray-200 rounded-full w-20"></div>
                </div>
                <div class="border-t border-gray-100 pt-4 flex justify-between">
                    <div class="h-5 bg-gray-200 rounded w-20"></div>
                    <div class="h-8 bg-gray-200 rounded w-24"></div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyOrders" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-6 text-gray-300">
                <i class="fas fa-receipt text-5xl"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-700">No orders yet</h2>
            <p class="text-gray-500 mt-2 mb-6">Looks like you haven't made any purchases yet.</p>
            <a href="/products" class="btn-green text-white px-6 py-2.5 rounded-xl font-medium shadow-sm">Start Shopping</a>
        </div>
    </main>

    <!-- Order Detail Modal -->
    <div id="orderDetailModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-xl font-bold text-gray-800">Order Details <span id="modalOrderId" class="text-gray-400 font-normal ml-2"></span></h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-6">
                <!-- Order Metadata -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pb-6 border-b border-gray-100">
                    <div>
                        <div class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Date</div>
                        <div id="modalDate" class="text-sm text-gray-800 font-medium"></div>
                    </div>
                    <div>
                        <div class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Status</div>
                        <div id="modalStatus" class="text-sm font-bold uppercase"></div>
                    </div>
                    <div>
                        <div class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Payment</div>
                        <div id="modalPayment" class="text-sm text-gray-800 font-medium capitalize"></div>
                    </div>
                    <div>
                        <div class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Shipping</div>
                        <div id="modalShipping" class="text-sm text-gray-800 font-medium capitalize"></div>
                    </div>
                </div>

                <!-- Items List -->
                <div id="modalItems" class="space-y-4">
                    <!-- Items will be injected here -->
                </div>

                <!-- Price Breakdown -->
                <div class="bg-gray-50 rounded-xl p-5 space-y-2">
                    <div class="flex justify-between text-sm text-gray-600">
                        <span>Subtotal</span>
                        <span id="modalSubtotal"></span>
                    </div>
                    <div class="flex justify-between text-sm text-gray-600">
                        <span>Shipping Fee</span>
                        <span id="modalShippingFee"></span>
                    </div>
                    <div class="flex justify-between text-lg font-bold text-gray-800 pt-2 border-t border-gray-200">
                        <span>Total</span>
                        <span id="modalTotal" class="text-[#8bb35c]"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl shadow-xl transition-all duration-500 opacity-0 translate-y-4 pointer-events-none z-50"></div>
</body>
</html>
